<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Publisher</title>
</head>
<body>
    <h1>MQTT Publisher</h1>

    <!-- Include the Paho MQTT library -->
<!--    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/mqttws31.min.js"></script>-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    
    <script>
        // Create a new MQTT client instance
        var client = new Paho.MQTT.Client("mqtt://localhost", Number(1883), "clientId");

        // Set callback handlers for connection lost and message arrival
        client.onConnectionLost = function(responseObject) {
            console.log("Connection lost:", responseObject.errorMessage);
        };

        client.onMessageArrived = function(message) {
            console.log("Message arrived:", message.payloadString);
        };

        // Connect the client
        client.connect({onSuccess: onConnect});

        // Callback function for successful connection
        function onConnect() {
            console.log("Connected to MQTT broker");

            // Publish a message to a topic
            var message = new Paho.MQTT.Message("Hello from MQTT Publisher");
            message.destinationName = "test/topic";
            client.send(message);
            console.log("Message published");
        }
    </script>
</body>
</html>
